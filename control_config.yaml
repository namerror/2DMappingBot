# Configure according to your robot's hardware and desired control parameters
serial:
  port: /dev/ttyUSB0
  baud_rate: 115200
  timeout_seconds: 0.05

control:
  command_interval_ms: 75
  command_duration_ms: 150
  default_pwm_percent: 30
  brake_duration_ms: 150

sensor:
  angle_offset_deg: 90.0 # this is the angle offset of the distance sensor relative to the robot forward direction. Positive to the left, negative to the right. Adjust according to your sensor's mounting position.

pose:
  mode: command_estimate
  command_estimate:
    wheel_diameter_cm: 6.5
    track_width_cm: 12.0
    motor_rpm_at_100_pwm: 120.0
    pwm_to_speed_scale: 1.0
  imu_estimate:
    enabled: false
